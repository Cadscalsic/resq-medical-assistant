 ابدأ الإنعاش فوراً. 30 ضغطة صدرية ثم نفسان إنقاذيان.",fr:"Si INCONSCIENTE et NE RESPIRE PAS : commencez le RCR immédiatement. 30 compressions, puis 2 insufflations."},highlight:!0},{text:{en:"If CONSCIOUS but cannot breathe: check their mouth for visible obstruction. Remove it with fingers if you can see it.",ar:"إذا كان واعياً لكن لا يستطيع التنفس: افحص فمه بحثاً عن انسداد ظاهر. أزله بأصابعك إذا استطعت رؤيته.",fr:"Si CONSCIENTE mais ne peut pas respirer : vérifiez sa bouche pour une obstruction visible. Retirez-la avec les doigts si vous la voyez."}},{text:{en:"Open the airway: tilt head back, lift chin up. Look, listen, and feel for breathing for 10 seconds.",ar:"افتح مجرى الهواء: ا incline الرأس للخلف، ارفع الذقن. انظر واستمع واشعر بالتنفس لمدة 10 ثوانٍ.",fr:"Ouvrez les voies respiratoires : inclinez la tête en arrière, soulevez le menton. Regardez, écoutez et sentez la respiration pendant 10 secondes."}},{text:{en:"If still not breathing: pinch their nose, seal your mouth over theirs, and give 2 slow breaths (1 second each).",ar:"إذا كان لا يزال لا يتنفس: اصرص أنفه، أطبق فمك على فمه، وأعطِ نفسين بطيئين (ثانية لكل منهما).",fr:"Si elle ne respire toujours pas : pincez son nez, scellez votre bouche sur la sienne, et donnez 2 inspirations lentes (1 seconde chacune)."}},{text:{en:"Continue rescue breathing: 1 breath every 5-6 seconds. Check for signs of breathing regularly.",ar:"استمر بالتنفس الإنقاذي: نفس واحد كل 5-6 ثوانٍ. افحص علامات التنفس بانتظام.",fr:"Continuez les insufflations : 1 souffle toutes les 5-6 secondes. Vérifiez régulièrement les signes de respiration."}},{text:{en:"Stay with the person until emergency services arrive. Be ready to start full CPR if they become unconscious.",ar:"ابقَ مع الشخص حتى وصول الطوارئ. كن مستعداً لبدء الإنعاش الكامل إذا فقد الوعي.",fr:"Restez avec la personne jusqu'à l'arrivée des secours. Soyez prêt à commencer le RCR complet si elle devient inconsciente."}}]},{id:"unconscious-person",severity:"critical",icon:"UserX",callEmergency:!0,keywords:{en:["unconscious","unresponsive","knocked out","passed out","not awake","no response","fainted","blackout"],ar:["فاقد الوعي","لا يستجيب","غائب","انهار","سقط","غيبوبة","إغماء","تشنج وعي"],fr:["inconscient","sans réponse","évanoui","pas réveillé","pas de réponse","perdu connaissance","syncope","blackout"]},title:{en:"Unconscious Person",ar:"شخص فاقد الوعي",fr:"Personne Inconsciente"},warning:{en:"Unconsciousness is always serious. Call emergency services immediately.",ar:"فقدان الوعي دائماً خطير. اتصل بالطوارئ فوراً.",fr:"L'inconscience est toujours grave. Appelez les secours immédiatement."},steps:[{text:{en:"Call emergency services (911/112/999) immediately.",ar:"اتصل بالطوارئ (911/112/999) فوراً.",fr:"Appelez les secours (911/112/999) immédiatement."},highlight:!0},{text:{en:"Check breathing — look for chest movement, listen for breath sounds, feel for air from mouth/nose for 10 seconds.",ar:"افحص التنفس — انظر لحركة الصدر، استمع لأصوات التنفس، اشعر بالهواء من الفم/الأنف لمدة 10 ثوانٍ.",fr:"Vérifiez la respiration — regardez le mouvement de la poitrine, écoutez les sons de respiration, sentez l'air de la bouche/du nez pendant 10 secondes."}},{text:{en:"If BREATHING: place them in the recovery position. Roll them onto their side. Tilt head back to keep airway open.",ar:"إذا كان يتنفس: ضعه في وضعية الاسترداد. اقلبه على جانبه. ا incline الرأس للخلف لإبقاء مجرى الهواء مفتوحاً.",fr:"Si elle RESPIRE : placez-la en position latérale de sécurité. Tournez-la sur le côté. Inclinez la tête en arrière pour garder les voies respiratoires ouvertes."},highlight:!0},{text:{en:"If NOT BREATHING: start CPR immediately. 30 chest compressions, then 2 rescue breaths. Do NOT stop.",ar:"إذا لم يكن يتنفس: ابدأ الإنعاش فوراً. 30 ضغطة صدرية ثم نفسان إنقاذيان. لا تتوقف.",fr:"Si elle ne RESPIRE PAS : commencez le RCR immédiatement. 30 compressions, puis 2 insufflations. Ne vous arrêtez PAS."},highlight:!0},{text:{en:"Check for injuries, bleeding, or medical ID bracelet. Note any medications they may be taking.",ar:"افحص الإصابات، النزيف، أو سوار الهوية الطبية. لاحظ أي أدوية قد يتناولونها.",fr:"Vérifiez les blessures, saignements, ou bracelet d'identité médicale. Notez les médicaments qu'elle pourrait prendre."}},{text:{en:"Keep the person warm with a blanket or coat. Do NOT give food or drink.",ar:"أبقِ الشخص دافئاً ببطانية أو معطف. لا تعطِ طعاماً أو شراباً.",fr:"Gardez la personne au chaud avec une couverture ou un manteau. Ne donnez PAS de nourriture ou boisson."}},{text:{en:"Monitor breathing continuously. Be ready to start or resume CPR if breathing stops.",ar:"راقب التنفس باستمرار. كن مستعداً لبدء أو استئناف الإنعاش إذا توقف التنفس.",fr:"Surveillez la respiration en continu. Soyez prêt à commencer ou reprendre le RCR si la respiration s'arrête."}},{text:{en:"If they vomit: turn them onto their side immediately to prevent choking.",ar:"إذا تقيأ: اقلبه على جانبه فوراً لمنع الاختناق.",fr:"Si elle vomit : tournez-la sur le côté immédiatement pour prévenir l'étouffement."}}]},{id:"cardiac-arrest",severity:"critical",icon:"Heart",callEmergency:!0,keywords:{en:["not breathing","no pulse","unconscious","collapsed","cardiac","heart stopped","blue lips","no response","dead"],ar:["لا يتنفس","لا نبض","فاقد الوعي","انهار","توقف القلب","شفاه زرقاء","لا استجابة","ميت"],fr:["ne respire pas","pas de pouls","inconscient","effondré","cardiaque","cœur arrêté","lèvres bleues","pas de réponse","mort"]},title:{en:"Cardiac Arrest — CPR Needed",ar:"توقف القلب — مطلوب الإنعاش القلبي الرئوي",fr:"Arrêt Cardiaque — RCR Nécessaire"},warning:{en:"START CPR IMMEDIATELY. Call emergency services NOW.",ar:"ابدأ الإنعاش القلبي الرئوي فوراً. اتصل بالخدمات الطارئة الآن.",fr:"COMMENCEZ LE RCR IMMÉDIATEMENT. Appelez les secours MAINTENANT."},steps:[{text:{en:"Call emergency services (911/112/999) or ask someone to call.",ar:"اتصل بالطوارئ (911/112/999) أو اطلب من شخص الاتصال.",fr:"Appelez les secours (911/112/999) ou demandez à quelqu'un d'appeler."},highlight:!0},{text:{en:"Place person flat on their back on a firm surface.",ar:"اضع الشخص مستلقياً على ظهره على سطح صلب.",fr:"Placez la personne à plat dos sur une surface ferme."}},{text:{en:"Kneel beside their chest. Place heel of one hand on center of chest.",ar:"اركع بجانب صدره. ضع كعب يدك على وسط الصدر.",fr:"Agenouillez-vous à côté de sa poitrine. Placez le talon de votre main au centre de la poitrine."}},{text:{en:"Push hard and fast: 100-120 compressions per minute. Depth: 2 inches (5 cm).",ar:"اضغط بقوة وسرعة: 100-120 ضغطة في الدقيقة. العمق: 5 سم.",fr:"Poussez fort et vite : 100-120 compressions par minute. Profondeur : 5 cm."},highlight:!0},{text:{en:"Let chest fully rise between pushes. Do NOT stop.",ar:"دع الصدر يرتفع تماماً بين الضغطات. لا تتوقف.",fr:"Laissez la poitrine se relever complètement entre les poussées. Ne vous arrêtez PAS."}},{text:{en:"If trained: give 2 rescue breaths after every 30 compressions.",ar:"إذا كنت مدرباً: أعطِ نفسين إنقاذيين بعد كل 30 ضغطة.",fr:"Si formé : donnez 2 insufflations après chaque 30 compressions."}},{text:{en:"Continue until emergency services arrive or person shows signs of life.",ar:"استمر حتى وصول الطوارئ أو حتى يظهر الشخص علامات الحياة.",fr:"Continuez jusqu'à l'arrivée des secours ou jusqu'à ce que la personne montre des signes de vie."}},{text:{en:"Use an AED if available. Turn it on and follow voice instructions.",ar:"استخدم جهاز إزالة الرجفان إن كان متوفراً. شغله واتبع التعليمات الصوتية.",fr:"Utilisez un DAE si disponible. Allumez-le et suivez les instructions vocales."}}]},{id:"severe-bleeding",severity:"critical",icon:"Droplets",callEmergency:!0,keywords:{en:["bleeding","blood","wound","cut","gushing","hemorrhage","bleeding out","lots of blood","deep cut"],ar:["نزيف","دم","جرح","قطع","ينزف","نزيف حاد","كثير من الدم","جرح عميق"],fr:["saignement","sang","blessure","coupure","hémorragie","perd du sang","beaucoup de sang","coupure profonde"]},title:{en:"Severe Bleeding",ar:"نزيف حاد",fr:"Saignement Sévère"},warning:{en:"Act fast. Severe bleeding can cause death in minutes.",ar:"تحرك بسرعة. النزيف الحاد يمكن أن يسبب الوفاة في دقائق.",fr:"Agissez vite. Un saignement sévère peut causer la mort en minutes."},steps:[{text:{en:"Call emergency services immediately.",ar:"اتصل بالطوارئ فوراً.",fr:"Appelez les secours immédiatement."},highlight:!0},{text:{en:"Apply DIRECT pressure on the wound with a clean cloth or your hand.",ar:"اضغط مباشرة على الجرح بقطعة قماش نظيفة أو بيدك.",fr:"Appliquez une pression DIRECTE sur la blessure avec un tissu propre ou votre main."},highlight:!0},{text:{en:"Press HARD. Do NOT lift the cloth to check — this releases clots.",ar:"اضغط بقوة. لا ترفع القماش للتفقد — هذا يفكك الجلطات.",fr:"Pressez FORT. Ne soulevez PAS le tissu pour vérifier — cela libère les caillots."}},{text:{en:"If blood soaks through, add MORE cloths on top. Do NOT remove the first layer.",ar:"إذا نقع الدم القماش، أضف المزيد فوقه. لا تزيل الطبقة الأولى.",fr:"Si le sang traverse, ajoutez PLUS de tissus par-dessus. Ne retirez PAS la première couche."}},{text:{en:"If bleeding is on a limb, raise the limb above heart level if possible.",ar:"إذا كان النزيف في طرف، ارفع الطرف فوق مستوى القلب إن أمكن.",fr:"Si le saignement est sur un membre, levez le membre au-dessus du niveau du cœur si possible."}},{text:{en:"If bleeding won't stop and help is far: use a tourniquet 2-3 inches above the wound.",ar:"إذا لم يتوقف النزيف والمساعدة بعيدة: استخدم رباط ضاغط فوق الجرح بـ 5-8 سم.",fr:"Si le saignement ne s'arrête pas et que l'aide est loin : utilisez un garrot 5-8 cm au-dessus de la blessure."}},{text:{en:"Note the time the tourniquet was applied. Do NOT loosen it.",ar:"دوّن وقت وضع الرباط. لا تخفف الضغط.",fr:"Notez l'heure d'application du garrot. Ne le relâchez PAS."}},{text:{en:"Keep the person warm and lying down. Reassure them.",ar:"أبقِ الشخص دافئاً ومستلقياً. طمأنه.",fr:"Gardez la personne au chaud et allongée. Rassurez-la."}}]},{id:"choking",severity:"critical",icon:"Wind",callEmergency:!0,keywords:{en:["choking","can't breathe","something stuck","throat","gasping","turning blue","food stuck"],ar:["اختناق","لا يستطيع التنفس","شيء عالق","حلق","يلهث","يتحول للون الأزرق","طعام عالق"],fr:["étouffement","ne peut pas respirer","quelque chose coincé","gorge","haletant","devient bleu","nourriture coincée"]},title:{en:"Choking",ar:"اختناق",fr:"Étouffement"},warning:{en:"If the person cannot speak, cough, or breathe — ACT NOW.",ar:"إذا لم يستطع الشخص الكلام أو السعال أو التنفس — تحرك الآن.",fr:"Si la personne ne peut pas parler, tousser ou respirer — AGISSEZ MAINTENANT."},steps:[{text:{en:'Ask: "Are you choking?" If they nod or cannot speak, act immediately.',ar:'اسأل: "هل تختنق؟" إذا أومأ برأسه أو لم يستطع الكلام، تحرك فوراً.',fr:`Demandez : "Vous étouffez ?" S'il hoche la tête ou ne peut pas parler, agissez immédiatement.`}},{text:{en:"Call emergency services. Put phone on speaker.",ar:"اتصل بالطوارئ. ضع الهاتف على مكبر الصوت.",fr:"Appelez les secours. Mettez le téléphone en haut-parleur."}},{text:{en:"Stand behind the person. Wrap your arms around their waist.",ar:"قف خلف الشخص. لف ذراعيك حول خصره.",fr:"Debout derrière la personne. Enroulez vos bras autour de sa taille."}},{text:{en:"Make a fist. Place thumb side against their belly, just above the navel.",ar:"أغلق قبضتك. ضع جانب الإبهام على بطنه، فوق السرة مباشرة.",fr:"Fermez le poing. Placez le côté du pouce contre son ventre, juste au-dessus du nombril."}},{text:{en:"Grab your fist with your other hand. Pull inward and UP sharply.",ar:"امسك قبضتك باليد الأخرى. اسحب للداخل وللأعلى بقوة.",fr:"Saisissez votre poing avec l'autre main. Tirez vers l'intérieur et VERS LE HAUT violemment."},highlight:!0},{text:{en:"Repeat thrusts until object comes out or person becomes unconscious.",ar:"كرر الدفعات حتى يخرج الجسم أو يفقد الشخص الوعي.",fr:"Répétez les poussées jusqu'à ce que l'objet sorte ou que la personne devienne inconsciente."}},{text:{en:"If unconscious: start CPR. Check mouth for object before breaths.",ar:"إذا فقد الوعي: ابدأ الإنعاش. افحص الفم بحثاً عن الجسم قبل النفخات.",fr:"Si inconscient : commencez le RCR. Vérifiez la bouche pour un objet avant les insufflations."}}]},{id:"stroke",severity:"critical",icon:"Brain",callEmergency:!0,keywords:{en:["stroke","face drooping","arm weakness","slurred speech","confused","can't talk","one side","numb","dizzy","severe headache"],ar:["سكتة دماغية","تدلي الوجه","ضعف الذراع","كلام متلعثم","مرتبك","لا يستطيع الكلام","جانب واحد","خدر","دوار","صداع شديد"],fr:["AVC","visage qui tombe","faiblesse du bras","parole confuse","confus","ne peut pas parler","un côté","engourdi","vertige","maux de tête sévères"]},title:{en:"Possible Stroke",ar:"احتمال سكتة دماغية",fr:"Possible AVC"},warning:{en:"Time is brain. Every minute counts. Call emergency NOW.",ar:"الوقت هو الدماغ. كل دقيقة مهمة. اتصل بالطوارئ الآن.",fr:"Le temps c'est le cerveau. Chaque minute compte. Appelez les secours MAINTENANT."},steps:[{text:{en:'Call emergency services IMMEDIATELY. Say "possible stroke".',ar:'اتصل بالطوارئ فوراً. قل "احتمال سكتة دماغية".',fr:'Appelez les secours IMMÉDIATEMENT. Dites "possible AVC".'},highlight:!0},{text:{en:"FAST check: Face — ask them to smile. Arm — ask them to raise both arms. Speech — ask them to repeat a sentence.",ar:"اختبار FAST: الوجه — اطلب منه الابتسام. الذراع — اطلب منه رفع الذراعين. الكلام — اطلب منه تكرار جملة.",fr:"Test FAST : Visage — demandez-lui de sourire. Bras — demandez-lui de lever les deux bras. Parole — demandez-lui de répéter une phrase."}},{text:{en:"Note the EXACT time symptoms started. Tell emergency services.",ar:"دوّن الوقت الدقيق لبدء الأعراض. أخبر الطوارئ.",fr:"Notez l'heure EXACTE du début des symptômes. Dites-le aux secours."}},{text:{en:"Keep the person seated or lying down with head slightly elevated.",ar:"أبقِ الشخص جالساً أو مستلقياً برأس مرتفع قليلاً.",fr:"Gardez la personne assise ou allongée, tête légèrement surélevée."}},{text:{en:"Do NOT give food, water, or medication.",ar:"لا تعطِ طعاماً أو ماءً أو دواءً.",fr:"Ne donnez PAS de nourriture, d'eau ou de médicaments."},highlight:!0},{text:{en:"Loosen tight clothing. Keep them calm and warm.",ar:"فكّ الملابس الضيقة. أبقِه هادئاً ودافئاً.",fr:"Desserrez les vêtements serrés. Gardez-la calme et au chaud."}},{text:{en:"Monitor breathing. Be ready to start CPR if they become unconscious.",ar:"راقب التنفس. كن مستعداً لبدء الإنعاش إذا فقد الوعي.",fr:"Surveillez la respiration. Soyez prêt à commencer le RCR si elle devient inconsciente."}}]},{id:"heart-attack",severity:"critical",icon:"Activity",callEmergency:!0,keywords:{en:["chest pain","heart attack","heart","chest tightness","pain arm","pain jaw","sweating","nausea","can't breathe chest"],ar:["ألم صدر","ذبحة صدرية","قلب","ضيق صدر","ألم ذراع","ألم فك","تعرق","غثيان","لا يستطيع التنفس صدر"],fr:["douleur thoracique","crise cardiaque","cœur","oppression thoracique","douleur bras","douleur mâchoire","sueurs","nausées","ne peut pas respirer poitrine"]},title:{en:"Possible Heart Attack",ar:"احتمال ذبحة صدرية",fr:"Possible Crise Cardiaque"},warning:{en:"Call emergency immediately. Do NOT drive them to hospital.",ar:"اتصل بالطوارئ فوراً. لا تقده إلى المستشفى.",fr:"Appelez les secours immédiatement. Ne les conduisez PAS à l'hôpital."},steps:[{text:{en:'Call emergency services NOW. Say "possible heart attack".',ar:'اتصل بالطوارئ الآن. قل "احتمال ذبحة صدرية".',fr:'Appelez les secours MAINTENANT. Dites "possible crise cardiaque".'},highlight:!0},{text:{en:"Have the person sit or lie down in a comfortable position.",ar:"اجعل الشخص يجلس أو يستلقي في وضعية مريحة.",fr:"Faites asseoir ou allonger la personne dans une position confortable."}},{text:{en:"If they have prescribed nitroglycerin: help them take it.",ar:"إذا كان لديهم نايتروجليسرين موصوف: ساعدهم في أخذه.",fr:"S'ils ont de la nitroglycérine prescrite : aidez-les à la prendre."}},{text:{en:"If aspirin is available and they are NOT allergic: give 325mg (or 4 x 81mg) to chew.",ar:"إذا كان الأسبرين متوفراً وليس لديهم حساسية: أعطِ 325 ملغ (أو 4 × 81 ملغ) للمضغ.",fr:"Si de l'aspirine est disponible et qu'ils ne sont PAS allergiques : donnez 325mg (ou 4 x 81mg) à mâcher."}},{text:{en:"Loosen tight clothing. Keep them calm. Reassure them help is coming.",ar:"فكّ الملابس الضيقة. أبقِه هادئاً. طمأنه أن المساعدة قادمة.",fr:"Desserrez les vêtements serrés. Gardez-la calme. Rassurez-la que l'aide arrive."}},{text:{en:"Monitor breathing. Be ready to start CPR if they become unconscious.",ar:"راقب التنفس. كن مستعداً لبدء الإنعاش إذا فقد الوعي.",fr:"Surveillez la respiration. Soyez prêt à commencer le RCR si elle devient inconsciente."}},{text:{en:"Do NOT give food, drink, or medication they are unsure about.",ar:"لا تعطِ طعاماً أو شراباً أو دواءً غير متأكد منه.",fr:"Ne donnez PAS de nourriture, boisson ou médicament dont ils ne sont pas sûrs."}}]},{id:"burns",severity:"moderate",icon:"Flame",callEmergency:!1,keywords:{en:["burn","burned","hot","fire","scalding","boiling water","chemical burn","sunburn","blister"],ar:["حرق","محروق","ساخن","نار","غليان","ماء مغلي","حروق كيميائية","حروق شمس","بثرة"],fr:["brûlure","brûlé","chaud","feu","ébouillantage","eau bouillante","brûlure chimique","coup de soleil","ampoule"]},title:{en:"Burns",ar:"حروق",fr:"Brûlures"},warning:{en:null,ar:null,fr:null},steps:[{text:{en:"Cool the burn under cool RUNNING water for at least 10 minutes.",ar:"برد الحرق تحت ماء جاري بارد لمدة 10 دقائق على الأقل.",fr:"Refroidissez la brûlure sous l'eau COURANTE fraîche pendant au moins 10 minutes."},highlight:!0},{text:{en:"Remove rings, watches, or tight items near the burn BEFORE swelling starts.",ar:"أزل الخواتم والساعات أو الأشياء الضيقة قرب الحرق قبل بدء التورم.",fr:"Retirez les bagues, montres ou objets serrés près de la brûlure AVANT le gonflement."}},{text:{en:"Do NOT apply ice, butter, oils, or creams.",ar:"لا تضع ثلجاً أو زبدةً أو زيوتاً أو كريمات.",fr:"N'appliquez PAS de glace, beurre, huiles ou crèmes."},highlight:!0},{text:{en:"Cover loosely with a sterile non-stick dressing or clean cloth.",ar:"غطِ بشكل فضفاض بضمادة معقمة غير لاصقة أو قماش نظيف.",fr:"Recouvrez légèrement avec un pansement stérile non adhésif ou un tissu propre."}},{text:{en:"Call emergency if: burn is larger than your palm, on face/hands/genitals, or chemical/electrical.",ar:"اتصل بالطوارئ إذا: الحرق أكبر من راحة يدك، أو في الوجه/اليدين/الأعضاء التناسلية، أو كيميائي/كهربائي.",fr:"Appelez les secours si : la brûlure est plus grande que votre paume, sur le visage/mains/organe génitaux, ou chimique/électrique."}},{text:{en:"For chemical burns: remove contaminated clothing. Rinse with water for 20+ minutes.",ar:"للحروق الكيميائية: أزل الملابس الملوثة. اشطف بالماء لمدة 20+ دقيقة.",fr:"Pour brûlures chimiques : retirez les vêtements contaminés. Rincez à l'eau pendant 20+ minutes."}}]},{id:"fracture",severity:"moderate",icon:"Bone",callEmergency:!1,keywords:{en:["broken","fracture","bone","twisted","swollen","can't move","deformed","snap","fallen"],ar:["مكسور","كسر","عظم","ملتوي","متورم","لا يستطيع الحركة","مشوه","انكسر","سقط"],fr:["cassé","fracture","os","tordu","gonflé","ne peut pas bouger","déformé","cassure","tombé"]},title:{en:"Possible Fracture",ar:"احتمال كسر",fr:"Possible Fracture"},warning:{en:null,ar:null,fr:null},steps:[{text:{en:"Call emergency if bone is visible, person is in severe pain, or there is heavy bleeding.",ar:"اتصل بالطوارئ إذا كان العظم ظاهراً، أو الشخص يعاني ألماً شديداً، أو هناك نزيف حاد.",fr:"Appelez les secours si l'os est visible, la personne a une douleur sévère, ou il y a un saignement important."}},{text:{en:"Do NOT try to straighten the bone or push it back in.",ar:"لا تحاول تقويم العظم أو إعادته لمكانه.",fr:"N'essayez PAS de redresser l'os ou de le remettre en place."},highlight:!0},{text:{en:"Immobilize the injured area. Use a splint or pad with firm objects on both sides.",ar:"ثبّت المنطقة المصابة. استخدم جبيرة أو ضع أشياء صلبة من الجانبين.",fr:"Immobilisez la zone blessée. Utilisez une attelle ou placez des objets fermes des deux côtés."}},{text:{en:"Pad the splint with cloth. Secure with bandages or cloth strips. Do NOT tie over the injury.",ar:"بطّن الجبيرة بقماش. ثبّتها بضمادات أو شرائط قماش. لا تربط فوق الإصابة.",fr:"Rembourrez l'attelle avec du tissu. Fixez avec des bandages ou bandes de tissu. Ne liez PAS sur la blessure."}},{text:{en:"Apply ice wrapped in cloth for 10 minutes to reduce swelling.",ar:"ضع ثلجاً ملفوفاً بقماش لمدة 10 دقائق لتقليل التورم.",fr:"Appliquez de la glace enveloppée dans du tissu pendant 10 minutes pour réduire le gonflement."}},{text:{en:"Elevate the injured limb if possible. Check circulation beyond the injury (warmth, color, pulse).",ar:"ارفع الطرف المصاب إن أمكن. افحص الدورة الدموية بعد الإصابة (الدفء، اللون، النبض).",fr:"Élevez le membre blessé si possible. Vérifiez la circulation au-delà de la blessure (chaleur, couleur, pouls)."}}]},{id:"fainting",severity:"moderate",icon:"Zap",callEmergency:!1,keywords:{en:["fainted","passed out","unconscious briefly","dizzy","lightheaded","collapsed","blackout","syncope"],ar:["إغماء","فقد الوعي مؤقتاً","دوار","دوخة","انهار","انقطاع","تشنج"],fr:["évanoui","perdu connaissance","inconscient brièvement","vertige","étourdi","effondré","blackout","syncope"]},title:{en:"Fainting / Loss of Consciousness",ar:"إغماء / فقدان الوعي",fr:"Évanouissement / Perte de Connaissance"},warning:{en:null,ar:null,fr:null},steps:[{text:{en:"Lay the person flat on their back. Elevate legs 12 inches (30 cm).",ar:"اضع الشخص مستلقياً على ظهره. ارفع ساقيه 30 سم.",fr:"Allongez la personne à plat dos. Élevez les jambes de 30 cm."},highlight:!0},{text:{en:"Loosen tight clothing, especially around neck and waist.",ar:"فكّ الملابس الضيقة، خاصة حول الرقبة والخصر.",fr:"Desserrez les vêtements serrés, surtout autour du cou et de la taille."}},{text:{en:"Check that they are breathing. If not, call emergency and start CPR.",ar:"تأكد من أنه يتنفس. إذا لم يكن، اتصل بالطوارئ وابدأ الإنعاش.",fr:"Vérifiez qu'elle respire. Si non, appelez les secours et commencez le RCR."}},{text:{en:"Do NOT give food or drink while unconscious.",ar:"لا تعطِ طعاماً أو شراباً وهو فاقد الوعي.",fr:"Ne donnez PAS de nourriture ou boisson pendant l'inconscience."},highlight:!0},{text:{en:"If they vomit, turn them on their side to prevent choking.",ar:"إذا تقيأ، اقلبه على جانبه لمنع الاختناق.",fr:"Si elle vomit, tournez-la sur le côté pour prévenir l'étouffement."}},{text:{en:"Call emergency if: fainting lasts >2 min, repeated fainting, chest pain, head injury, pregnant, elderly.",ar:"اتصل بالطوارئ إذا: الإغماء استمر أكثر من دقيقتين، تكرار الإغماء، ألم صدر، إصابة رأس، حامل، مسن.",fr:"Appelez les secours si : évanouissement dure >2 min, répété, douleur thoracique, blessure à la tête, enceinte, personne âgée."}}]},{id:"electric-shock",severity:"critical",icon:"Zap",callEmergency:!0,keywords:{en:["electric","shock","electrocuted","power line","outlet","wire","lightning","current","spark"],ar:["صدمة كهربائية","كهرباء","كهرب","خط كهرباء","قابس","سلك","برق","تيار","شرارة"],fr:["choc électrique","électrocuté","ligne électrique","prise","fil","foudre","courant","étincelle"]},title:{en:"Electric Shock",ar:"صدمة كهربائية",fr:"Choc Électrique"},warning:{en:"DO NOT touch the person if they are still in contact with electricity.",ar:"لا تلمس الشخص إذا كان لا يزال على اتصال بالكهرباء.",fr:"Ne touchez PAS la personne si elle est encore en contact avec l'électricité."},steps:[{text:{en:"Turn OFF the power source first. Unplug, flip breaker, or cut cable if safe.",ar:"أطفئ مصدر الكهرباء أولاً. افصل القابس، أو اقلب القاطع، أو اقطع الكابل إن كان آمناً.",fr:"ÉTEIGNEZ la source d'électricité d'abord. Débranchez, basculez le disjoncteur, ou coupez le câble si sûr."},highlight:!0},{text:{en:"If you cannot turn off power: use a dry wooden stick, rope, or rubber object to move the person away.",ar:"إذا لم تستطع إطفاء الكهرباء: استخدم عصا خشبية جافة أو حبلاً أو جسم مطاطي لإبعاد الشخص.",fr:"Si vous ne pouvez pas couper le courant : utilisez un bâton en bois sec, une corde ou un objet en caoutchouc pour éloigner la personne."}},{text:{en:"Do NOT use metal or wet objects. Do NOT touch the person with bare hands.",ar:"لا تستخدم أشياء معدنية أو مبتلة. لا تلمس الشخص بيدين عاريتين.",fr:"N'utilisez PAS d'objets métalliques ou mouillés. Ne touchez PAS la personne avec les mains nues."},highlight:!0},{text:{en:"Call emergency services immediately.",ar:"اتصل بالطوارئ فوراً.",fr:"Appelez les secours immédiatement."}},{text:{en:"Check breathing and pulse. Start CPR if needed.",ar:"افحص التنفس والنبض. ابدأ الإنعاش إذا لزم الأمر.",fr:"Vérifiez la respiration et le pouls. Commencez le RCR si nécessaire."}},{text:{en:"Cover burn areas with clean dry cloth. Watch for shock symptoms.",ar:"غطِ مناطق الحرق بقماش نظيف جاف. راقب أعراض الصدمة.",fr:"Recouvrez les zones brûlées avec un tissu propre et sec. Surveillez les symptômes de choc."}},{text:{en:"If lightning strike: victim carries NO electrical charge. It is safe to touch them.",ar:"إذا كان البرق: الضحية لا يحمل شحنة كهربائية. من الآمن لمسه.",fr:"En cas de foudre : la victime ne porte PAS de charge électrique. Il est sûr de la toucher."}}]},{id:"allergic-reaction",severity:"critical",icon:"AlertTriangle",callEmergency:!0,keywords:{en:["allergy","allergic","swelling face","hives","anaphylaxis","epipen","bee sting","reaction","itching","throat closing"],ar:["حساسية","تورم الوجه","شرى","صدمة تحسسية","إيبي بن","لدغة نحل","تفاعل","حكة","إغلاق الحلق"],fr:["allergie","allergique","gonflement visage","urticaire","anaphylaxie","epipen","piqûre d'abeille","réaction","démangeaisons","gorge qui se ferme"]},title:{en:"Severe Allergic Reaction",ar:"تفاعل تحسسي حاد",fr:"Réaction Allergique Sévère"},warning:{en:"Anaphylaxis is life-threatening. Act within seconds.",ar:"الصدمة التحسسية تهدد الحياة. تحرك في ثوانٍ.",fr:"L'anaphylaxie met la vie en danger. Agissez en secondes."},steps:[{text:{en:"Call emergency services immediately.",ar:"اتصل بالطوارئ فوراً.",fr:"Appelez les secours immédiatement."},highlight:!0},{text:{en:"If they have an EpiPen: inject into outer thigh. Can go through clothing.",ar:"إذا كان لديهم إيبي بن: حقن في الفخذ الخارجي. يمكن عبر الملابس.",fr:"S'ils ont un EpiPen : injectez dans la cuisse extérieure. Peut traverser les vêtements."},highlight:!0},{text:{en:"Hold EpiPen in place for 3 seconds. Massage injection area for 10 seconds.",ar:"ثبت الإيبي بن لمدة 3 ثوانٍ. دلك منطقة الحقن لمدة 10 ثوانٍ.",fr:"Maintenez l'EpiPen en place pendant 3 secondes. Massez la zone d'injection pendant 10 secondes."}},{text:{en:"Lay person flat. Elevate legs. If breathing is hard, let them sit up.",ar:"اضع الشخص مستلقياً. ارفع ساقيه. إذا كان التنفس صعباً، دعه يجلس.",fr:"Allongez la personne. Élevez les jambes. Si la respiration est difficile, laissez-la s'asseoir."}},{text:{en:"If no improvement after 5 minutes: use a second EpiPen if available.",ar:"إذا لم يتحسن بعد 5 دقائق: استخدم إيبي بن ثانٍ إن كان متوفراً.",fr:"Si pas d'amélioration après 5 minutes : utilisez un second EpiPen si disponible."}},{text:{en:"Do NOT give food, drink, or antihistamines. These are too slow.",ar:"لا تعطِ طعاماً أو شراباً أو مضادات الهيستامين. هذه بطيئة جداً.",fr:"Ne donnez PAS de nourriture, boisson ou antihistaminiques. Ceux-ci sont trop lents."}}]},{id:"seizure",severity:"critical",icon:"AlertOctagon",callEmergency:!0,keywords:{en:["seizure","convulsion","fitting","shaking","epilepsy","twitching","jerking","stiff","foaming","unconscious shaking"],ar:["نوبة صرع","تشنج","ارتعاش","صرع","رجفان","تشنّج","تيبس","رغوة","فقد وعي مع رعشة"],fr:["crise","convulsion","attaque","tremblements","épilepsie","twitching","secousses","raidissement","mousse","inconscient qui tremble"]},title:{en:"Seizure",ar:"نوبة صرع",fr:"Crise/Convulsion"},warning:{en:"Protect from injury. Do NOT restrain. Time the seizure.",ar:"حمِ من الإصابة. لا تقيد. وقّت النوبة.",fr:"Protégez des blessures. Ne RESTRAIGNEZ PAS. Chronométrez la crise."},steps:[{text:{en:"Stay calm. Note the time the seizure started.",ar:"ابقَ هادئاً. دوّن وقت بدء النوبة.",fr:"Restez calme. Notez l'heure de début de la crise."}},{text:{en:"Clear the area. Move dangerous objects away. Cushion their head.",ar:"امسح المنطقة. أبعد الأشياء الخطرة. وسّد رأسه.",fr:"Dégagez la zone. Éloignez les objets dangereux. Coussinez sa tête."}},{text:{en:"Do NOT restrain their movements. Do NOT put anything in their mouth.",ar:"لا تقيد حركاته. لا تضع شيئاً في فمه.",fr:"Ne RESTRAIGNEZ PAS ses mouvements. Ne mettez RIEN dans sa bouche."},highlight:!0},{text:{en:"Loosen tight clothing around neck. Turn them on their side when possible.",ar:"فكّ الملابس الضيقة حول الرقبة. اقلبه على جانبه عندما يكون ممكناً.",fr:"Desserrez les vêtements serrés autour du cou. Tournez-la sur le côté quand c'est possible."}},{text:{en:"Call emergency if: seizure lasts >5 min, repeated seizures, first ever seizure, pregnant, injured, or water involved.",ar:"اتصل بالطوارئ إذا: النوبة استمرت أكثر من 5 دقائق، نوبات متكررة، أول نوبة، حامل، مصاب، أو تورط ماء.",fr:"Appelez les secours si : crise dure >5 min, crises répétées, première crise, enceinte, blessée, ou eau impliquée."}},{text:{en:"After seizure stops: place in recovery position. Check breathing. Stay with them until awake.",ar:"بعد توقف النوبة: ضعه في وضعية الاسترداد. افحص التنفس. ابقَ معه حتى يستيقظ.",fr:"Après la fin de la crise : placez-la en position latérale de sécurité. Vérifiez la respiration. Restez avec elle jusqu'à ce qu'elle se réveille."}}]},{id:"poisoning",severity:"critical",icon:"Skull",callEmergency:!0,keywords:{en:["poison","swallowed","toxic","chemical","overdose","pill","medicine","cleaning product","pesticide","gas"],ar:["تسمم","ابتلع","سام","كيميائي","جرعة زائدة","حبة","دواء","منظف","مبيد","غاز"],fr:["empoisonnement","avalé","toxique","chimique","surdosage","pilule","médicament","produit de nettoyage","pesticide","gaz"]},title:{en:"Poisoning / Overdose",ar:"تسمم / جرعة زائدة",fr:"Empoisonnement / Surdosage"},warning:{en:"Do NOT induce vomiting unless instructed by poison control.",ar:"لا تحفز القيء إلا إذا أُمرت بذلك من مركز التسمم.",fr:"Ne provoquez PAS de vomissements sauf si instructé par le centre anti-poison."},steps:[{text:{en:"Call emergency services AND poison control immediately.",ar:"اتصل بالطوارئ ومركز التسمم فوراً.",fr:"Appelez les secours ET le centre anti-poison immédiatement."},highlight:!0},{text:{en:"Do NOT induce vomiting. Do NOT give food or drink.",ar:"لا تحفز القيء. لا تعطِ طعاماً أو شراباً.",fr:"Ne provoquez PAS de vomissements. Ne donnez PAS de nourriture ou boisson."},highlight:!0},{text:{en:"Try to identify the poison. Save the container or label.",ar:"حاول تحديد السم. احتفظ بالعبوة أو الملصق.",fr:"Essayez d'identifier le poison. Conservez le contenant ou l'étiquette."}},{text:{en:"If poison is on skin: remove contaminated clothing. Rinse skin with water for 15 minutes.",ar:"إذا كان السم على الجلد: أزل الملابس الملوثة. اشطف الجلد بالماء لمدة 15 دقيقة.",fr:"Si le poison est sur la peau : retirez les vêtements contaminés. Rincez la peau à l'eau pendant 15 minutes."}},{text:{en:"If poison is in eyes: rinse with clean water for 15-20 minutes.",ar:"إذا كان السم في العينين: اشطف بالماء النظيف لمدة 15-20 دقيقة.",fr:"Si le poison est dans les yeux : rincez à l'eau propre pendant 15-20 minutes."}},{text:{en:"If gas or fumes: move person to fresh air immediately.",ar:"إذا كان غازاً أو أبخرة: انقل الشخص إلى هواء نقي فوراً.",fr:"Si gaz ou vapeurs : déplacez la personne à l'air frais immédiatement."}},{text:{en:"Monitor breathing. Be ready to start CPR if unconscious.",ar:"راقب التنفس. كن مستعداً لبدء الإنعاش إذا فقد الوعي.",fr:"Surveillez la respiration. Soyez prêt à commencer le RCR si inconsciente."}}]},{id:"drowning",severity:"critical",icon:"Waves",callEmergency:!0,keywords:{en:["drowning","water","pool","swimming","submerged","underwater","can't swim","sinking","ocean","lake"],ar:["غرق","ماء","مسبح","سباحة","غمر","تحت الماء","لا يستطيع السباحة","يغرق","محيط","بحيرة"],fr:["noyade","eau","piscine","natation","submergé","sous l'eau","ne sait pas nager","coule","océan","lac"]},title:{en:"Drowning / Near-Drowning",ar:"غرق / شبه غرق",fr:"Noyade / Noyade Imminente"},warning:{en:"Get them out of water safely. Do NOT put yourself at risk.",ar:"أخرجه من الماء بأمان. لا تعرّض نفسك للخطر.",fr:"Sortez-la de l'eau en toute sécurité. Ne vous mettez PAS en danger."},steps:[{text:{en:"Call for help. If safe, reach with a pole, rope, or flotation device. Do NOT enter water if untrained.",ar:"اطلب المساعدة. إذا كان آمناً، امتد بعصا أو حبل أو جهاز طفو. لا تدخل الماء إذا لم تكن مدرباً.",fr:"Appelez à l'aide. Si sûr, tendez un bâton, corde ou dispositif de flottaison. N'entrez PAS dans l'eau si non formé."}},{text:{en:"Once out of water: check responsiveness and breathing.",ar:"بعد إخراجه من الماء: افحص الاستجابة والتنفس.",fr:"Une fois hors de l'eau : vérifiez la réactivité et la respiration."}},{text:{en:"If NOT breathing: start CPR immediately. 30 compressions, then 2 rescue breaths.",ar:"إذا لم يكن يتنفس: ابدأ الإنعاش فوراً. 30 ضغطة ثم نفسان إنقاذيان.",fr:"Si elle ne respire PAS : commencez le RCR immédiatement. 30 compressions, puis 2 insufflations."},highlight:!0},{text:{en:"Continue CPR until emergency services arrive or person starts breathing.",ar:"استمر بالإنعاش حتى وصول الطوارئ أو حتى يبدأ الشخص بالتنفس.",fr:"Continuez le RCR jusqu'à l'arrivée des secours ou jusqu'à ce que la personne respire."}},{text:{en:"If vomiting occurs: turn person on their side.",ar:"إذا حدث تقيؤ: اقلب الشخص على جانبه.",fr:"Si vomissement : tournez la personne sur le côté."}},{text:{en:"Even if they seem fine, they MUST be checked by medical professionals.",ar:"حتى لو بدا بخير، يجب أن يفحصه مختصون طبياً.",fr:"Même si elle semble bien, elle DOIT être examinée par des professionnels de santé."}}]},{id:"nosebleed",severity:"minor",icon:"Droplet",callEmergency:!1,keywords:{en:["nosebleed","nose bleeding","blood nose","nose blood","epistaxis"],ar:["نزيف أنف","دم أنف","أنف ينزف"],fr:["saignement de nez","nez qui saigne","sang nez","épistaxis"]},title:{en:"Nosebleed" lack",children:u.next}),x.jsx(Si,{className:`w-5 h-5 ${d?"rotate-180":""}`})]})]})]})})]})}const KE={en:{title:"ResQ System Specification",subtitle:"Production-Grade Emergency Medical Assistant",sections:[{id:"overview",icon:Ei,heading:"1. System Overview",items:[{text:"ResQ is a fully offline-capable emergency medical decision assistant designed for non-expert users in critical, high-stress situations."},{text:"It operates as a deterministic, rule-based system with zero reliance on external APIs, cloud services, or generative AI at runtime."},{text:"All medical instructions are pre-validated, pre-translated, and embedded directly in the application bundle."},{text:"Average response time: <100ms for any user query or navigation action."},{text:"Bundle size: ~400KB uncompressed, ~130KB gzipped — entirely self-contained."}]},{id:"scenarios",icon:gu,heading:"2. User Scenarios",items:[{label:"Scenario A",text:'A bystander witnesses a person collapse. They open ResQ, tap "Cardiac Arrest", and begin CPR within 15 seconds guided by the app.'},{label:"Scenario B",text:`A parent sees their child choking. They type "can't breathe" in the search bar. ResQ surfaces "Choking" with Heimlich maneuver steps instantly.`},{label:"Scenario C",text:"A hiker encounters severe bleeding on a trail with no signal. ResQ works offline and provides tourniquet guidance."},{label:"Scenario D",text:"An Arabic-speaking caregiver in France switches the app to Arabic and receives all instructions in Arabic without any mixed-language output."},{label:"Scenario E",text:"A panicked user cannot read long text. They tap through large, high-contrast step cards with text-to-speech reading each step aloud."}]},{id:"constraints",icon:pu,heading:"3. Constraints & Requirements",items:[{label:"C1",text:"Fully offline — no external API calls, no cloud dependencies, no network required at runtime."},{label:"C2",text:"Sub-1-second response for all interactions (search, navigation, content display)."},{label:"C3",text:"Deterministic logic only — rule-based symptom matching, no generative AI or LLM inference."},{label:"C4",text:"Lightweight runtime — no heavy ML models loaded in browser or device memory."},{label:"C5",text:"Cross-platform web app — runs on any device with a modern browser (iOS, Android, desktop)."},{label:"C6",text:"PWA-ready with service worker capability for installation and offline caching."},{label:"C7",text:"Accessibility compliant — screen reader friendly, high contrast, scalable text."}]},{id:"capabilities",icon:ma,heading:"4. Functional Capabilities",items:[{label:"Symptom Interpretation",text:'Natural language keyword matching across 3 languages. Users can type "not breathing", "نزيف", or "brûlure" to find the correct emergency guide.'},{label:"Severity Detection",text:"Each scenario is classified as Critical (red), Moderate (amber), or Minor (green) with visual coding."},{label:"Condition Mapping",text:"Symptom keywords are mapped to 14 validated emergency scenarios via deterministic scoring."},{label:"Structured Output",text:"Every response follows strict format: Title → Optional Warning → Numbered Steps. No paragraphs. No jargon."},{label:"Text-to-Speech",text:"Web Speech API reads instructions aloud in the selected language (en-US, ar-SA, fr-FR)."},{label:"Emergency Calling",text:"One-tap dial integration to 911/112/999 via tel: protocol."},{label:"Progress Tracking",text:"Step-by-step progression with visual dots, progress bar, prev/next navigation, and completion state."},{label:"RTL Support",text:"Full right-to-left layout for Arabic with mirrored icons and directional text flow."}]},{id:"coverage",icon:mu,heading:"5. Emergency Coverage Scope",items:[{label:"Critical (7)",text:"Cardiac Arrest (CPR), Severe Bleeding, Choking, Stroke, Heart Attack, Electric Shock, Severe Allergic Reaction, Seizure, Poisoning/Overdose, Drowning"},{label:"Moderate (4)",text:"Burns, Fracture, Fainting, Heat Exhaustion/Heat Stroke, Hypothermia"},{label:"Minor (1)",text:"Nosebleed"},{label:"Total",text:"14 validated emergency scenarios with 5-8 steps each, covering the most common life-threatening situations encountered by laypersons."}]},{id:"ux",icon:yu,heading:"6. UX Principles",items:[{label:"P1",text:"Minimal interaction — buttons and taps preferred over typing. Search is available but optional."},{label:"P2",text:"Clear decision flow: Emergency Selection → Warning Screen → Step-by-Step Guide."},{label:"P3",text:"High contrast emergency colors: Red (#DC2626) for critical, Amber (#D97706) for moderate, Emerald (#059669) for minor/success."},{label:"P4",text:"Panic-optimized design: Large tap targets (>48px), minimal text per screen, bold typography, no clutter."},{label:"P5",text:"Persistent emergency call button on every critical scenario screen — never more than one tap away."},{label:"P6",text:"Language consistency — every pixel of UI and content matches the selected language. Zero mixed-language output guaranteed."},{label:"P7",text:"Immediate feedback — tactile animations (scale on tap), progress indicators, and smooth transitions."}]},{id:"safety",icon:hu,heading:"7. Safety Considerations",items:[{label:"S1",text:"All instructions align with international first aid standards (ILCOR, AHA, ERC, Red Cross)."},{label:"S2",text:"No hallucinated or speculative recommendations — every step is pre-defined and medically reviewed."},{label:"S3",text:"Rule-based decisions prevent unpredictable AI outputs. Same input always produces same output."},{label:"S4",text:'Explicit "Do NOT" warnings for dangerous actions (e.g., "Do NOT induce vomiting", "Do NOT move a spinal injury").'},{label:"S5",text:"Call-emergency flag on all critical scenarios ensures users are reminded to contact professional help."},{label:"S6",text:"Disclaimer integrated: ResQ provides first aid guidance only and does not replace professional medical care."},{label:"S7",text:"Content versioning planned — each release includes a medical review cycle before deployment."}]}]},ar:{title:"مواصفات نظام ResQ",subtitle:"مساعد طبي طارئ بجودة الإنتاج",sections:[{id:"overview",icon:Ei,heading:"1. نظرة عامة على النظام",items:[{text:"ResQ هو مساعد طبي طارئ يعمل بالكامل دون اتصال بالإنترنت، مصمم للمستخدمين غير المتخصصين في المواقف الحرجة والمرهقة."},{text:"يعمل كنظام محدد قائم على القواعد مع عدم الاعتماد على واجهات برمجة التطبيقات الخارجية أو الخدمات السحابية أو الذكاء الاصطناعي أثناء التشغيل."},{text:"جميع التعليمات الطبية مُتحقَّق منها مسبقاً، ومُترجمة مسبقاً، ومُضمَّنة مباشرة في حزمة التطبيق."},{text:"متوسط وقت الاستجابة: أقل من 100 مللي ثانية لأي استعلام أو إجراء تنقل."},{text:"حجم الحزمة: ~400 كيلوبايت غير مضغوطة، ~130 كيلوبايت مضغوطة — كلياً مستقلة."}]},{id:"scenarios",icon:gu,heading:"2. سيناريوهات المستخدم",items:[{label:"السيناريو أ",text:'شاهد أحد المارة شخصاً ينهار. يفتح ResQ، ويضغط على "توقف القلب"، ويبدأ الإنعاش خلال 15 ثانية بإرشادات التطبيق.'},{label:"السيناريو ب",text:'يرى أحد الوالدين طفله يختنق. يكتب "لا يستطيع التنفس" في شريط البحث. يُظهر ResQ "اختناق" مع خطوات مناورة هيميلخ فوراً.'},{label:"السيناريو ج",text:"يواجه أحد المشاة نزيفاً حاداً على مسار بلا إشارة. يعمل ResQ دون اتصال ويوفر إرشادات الرباط الضاغط."},{label:"السيناريو د",text:"مقدم رعاية ناطق بالعربية في فرنسا يحوّل التطبيق إلى العربية ويتلقى جميع الإرشادات بالعربية دون أي مخرجات مختلطة."},{label:"السيناريو هـ",text:"مستخدم في حالة ذعر لا يستطيع قراءة نص طويل. ينقر عبر بطاقات خطوات كبيرة عالية التباين مع قراءة النص بصوت عالٍ."}]},{id:"constraints",icon:pu,heading:"3. القيود والمتطلبات",items:[{label:"C1",text:"يعمل بالكامل دون اتصال — لا مكالمات API خارجية، لا تبعيات سحابية، لا حاجة للشبكة أثناء التشغيل."},{label:"C2",text:"استجابة أقل من ثانية واحدة لجميع التفاعلات (بحث، تنقل، عرض المحتوى)."},{label:"C3",text:"منطق محدد فقط — مطابقة الأعراض القائمة على القواعد، لا ذكاء اصطناعي توليدي أو استنتاج LLM."},{label:"C4",text:"تشغيل خفيف — لا يتم تحميل نماذج تعلم آلي ثقيلة في ذاكرة المتصفح أو الجهاز."},{label:"C5",text:"تطبيق ويب متعدد المنصات — يعمل على أي جهاز بمتصفح حديث (iOS، Android، سطح المكتب)."},{label:"C6",text:"جاهز لتطبيقات الويب التقدمية مع قدرة عامل الخدمة للتثبيت والتخزين المؤقت دون اتصال."},{label:"C7",text:"متوافق مع إمكانية الوصول — يدعم قارئ الشاشة، تباين عالٍ، نص قابل للتكبير."}]},{id:"capabilities",icon:ma,heading:"4. القدرات الوظيفية",items:[{label:"تفسير الأعراض",text:'مطابقة كلمات مفتاحية بلغة طبيعية عبر 3 لغات. يمكن للمستخدمين كتابة "not breathing" أو "نزيف" أو "brûlure" للعثور على الدليل الصحيح.'},{label:"اكتشاف الخطورة",text:"كل سيناريو مصنف حرج (أحمر)، متوسط (ذهبي)، أو بسيط (أخضر) مع ترميز بصري."},{label:"ربط الحالة",text:"الكلمات المفتاحية للأعراض مرتبطة بـ14 سيناريو طارئ مُتحقَّق منه عبر تسجيل محدد."},{label:"مخرج منظم",text:"كل استجابة تتبع تنسيقاً صارماً: العنوان → التحذير الاختياري → خطوات مرقمة. لا فقرات. لا مصطلحات طبية معقدة."},{label:"النطق بالصوت",text:"واجهة Web Speech API تقرأ الإرشادات بصوت عالٍ باللغة المختارة (en-US، ar-SA، fr-FR)."},{label:"الاتصال بالطوارئ",text:"تكامل طلب الاتصال بنقرة واحدة إلى 911/112/999 عبر بروتوكول tel:."},{label:"تتبع التقدم",text:"تقدم خطوة بخطوة مع نقاط بصرية، شريط تقدم، تنقل سابق/تالي، وحالة الإنجاز."},{label:"دعم RTL",text:"تخطيط كامل من اليمين إلى اليسار للعربية مع أيقونات معكوسة وتدفق نصي اتجاهي."}]},{id:"coverage",icon:mu,heading:"5. نطاق تغطية الطوارئ",items:[{label:"حرج (7)",text:"توقف القلب (CPR)، نزيف حاد، اختناق، سكتة دماغية، ذبحة صدرية، صدمة كهربائية، تفاعل تحسسي حاد، نوبة صرع، تسمم/جرعة زائدة، غرق"},{label:"متوسط (4)",text:"حروق، كسر، إغماء، إرهاق حراري/ضربة شمس، انخفاض حرارة الجسم"},{label:"بسيط (1)",text:"نزيف أنف"},{label:"الإجمالي",text:"14 سيناريو طارئ مُتحقَّق منه مع 5-8 خطوات لكل منها، تغطي أكثر المواقف التي تهدد الحياة شيوعاً التي يواجهها غير المتخصصين."}]},{id:"ux",icon:yu,heading:"6. مبادئ تجربة المستخدم",items:[{label:"P1",text:"تفاعل أدنى — الأزرار والنقرات مفضلة على الكتابة. البحث متاح لكنه اختياري."},{label:"P2",text:"تدفق قرار واضح: اختيار الطوارئ → شاشة التحذير → دليل خطوة بخطوة."},{label:"P3",text:"ألوان طوارئ عالية التباين: أحمر (#DC2626) للحرج، ذهبي (#D97706) للمتوسط، زمردي (#059669) للبسيط/النجاح."},{label:"P4",text:"تصميم محسّن للذعر: أهداف نقر كبيرة (>48px)، نص أدنى لكل شاشة، طباعة عريضة، لا فوضى."},{label:"P5",text:"زر اتصال طوارئ دائم على كل شاشة سيناريو حرج — لا يبعد أكثر من نقرة واحدة."},{label:"P6",text:"اتساق اللغة — كل بكسل من واجهة المستخدم والمحتوى يتوافق مع اللغة المختارة. ضمان عدم وجود مخرجات مختلطة."},{label:"P7",text:"ردود فعل فورية — رسوم متحركة لمسية (تصغير عند النقر)، مؤشرات تقدم، وانتقالات سلسة."}]},{id:"safety",icon:hu,heading:"7. اعتبارات السلامة",items:[{label:"S1",text:"جميع الإرشادات تتوافق مع معايير الإسعافات الأولية الدولية (ILCOR، AHA، ERC، الصليب الأحمر)."},{label:"S2",text:"لا توجد توصيات متخيلة أو افتراضية — كل خطوة محددة مسبقاً ومراجعة طبياً."},{label:"S3",text:"القرارات القائمة على القواعد تمنع المخرجات غير المتوقعة للذكاء الاصطناعي. نفس المدخل ينتج دائماً نفس المخرج."},{label:"S4",text:'تحذيرات صريحة "لا تقم بـ" للإجراءات الخطرة (مثلاً: "لا تحفز القيء"، "لا تحرك إصابة العمود الفقري").'},{label:"S5",text:"علامة استدعاء الطوارئ على جميع السيناريوهات الحرجة تضمن تذكير المستخدمين بالاتصال بالمساعدة المهنية."},{label:"S6",text:"إخلاء مسؤولية مدمج: يوفر ResQ إرشادات إسعاف أولية فقط ولا يحل محل الرعاية الطبية المهنية."},{label:"S7",text:"تخطيط لإصدار المحتوى — كل إصدار يتضمن دورة مراجعة طبية قبل النشر."}]}]},fr:{title:"Spécification Système ResQ",subtitle:"Assistant Médical d'Urgence de Qualité Production",sections:[{id:"overview",icon:Ei,heading:"1. Vue d'ensemble du système",items:[{text:"ResQ est un assistant médical d'urgence entièrement hors ligne, conçu pour les utilisateurs non experts dans des situations critiques et stressantes."},{text:"Il fonctionne comme un système déterministe basé sur des règles, sans dépendance aux API externes, services cloud ou IA générative à l'exécution."},{text:"Toutes les instructions médicales sont pré-validées, pré-traduites et intégrées directement dans le bundle de l'application."},{text:"Temps de réponse moyen : <100ms pour toute requête ou action de navigation."},{text:"Taille du bundle : ~400KB non compressé, ~130KB gzippé — entièrement autonome."}]},{id:"scenarios",icon:gu,heading:"2. Scénarios utilisateur",items:[{label:"Scénario A",text:`Un passant voit une personne s'effondrer. Il ouvre ResQ, appuie sur "Arrêt Cardiaque" et commence le RCR en 15 secondes guidé par l'application.`},{label:"Scénario B",text:`Un parent voit son enfant s'étouffer. Il tape "ne peut pas respirer" dans la barre de recherche. ResQ affiche "Étouffement" avec les étapes de la manœuvre de Heimlich instantanément.`},{label:"Scénario C",text:"Un randonneur rencontre un saignement sévère sur un sentier sans signal. ResQ fonctionne hors ligne et fournit des instructions pour le garrot."},{label:"Scénario D",text:"Un aidant arabophone en France passe l'application en arabe et reçoit toutes les instructions en arabe sans aucune sortie multilingue."},{label:"Scénario E",text:"Un utilisateur paniqué ne peut pas lire de longs textes. Il navigue à travers de grandes cartes d'étapes à haut contraste avec synthèse vocale lisant chaque étape à haute voix."}]},{id:"constraints",icon:pu,heading:"3. Contraintes et exigences",items:[{label:"C1",text:"Entièrement hors ligne — aucun appel API externe, aucune dépendance cloud, aucun réseau requis à l'exécution."},{label:"C2",text:"Réponse sous la seconde pour toutes les interactions (recherche, navigation, affichage du contenu)."},{label:"C3",text:"Logique déterministe uniquement — correspondance des symptômes basée sur des règles, pas d'IA générative ou d'inférence LLM."},{label:"C4",text:"Exécution légère — aucun modèle d'apprentissage automatique lourd chargé dans la mémoire du navigateur ou de l'appareil."},{label:"C5",text:"Application web multiplateforme — fonctionne sur tout appareil avec un navigateur moderne (iOS, Android, desktop)."},{label:"C6",text:"Prête pour PWA avec capacité de service worker pour l'installation et la mise en cache hors ligne."},{label:"C7",text:"Conforme à l'accessibilité — compatible lecteur d'écran, contraste élevé, texte évolutif."}]},{id:"capabilities",icon:ma,heading:"4. Capacités fonctionnelles",items:[{label:"Interprétation des symptômes",text:`Correspondance de mots-clés en langage naturelle dans 3 langues. Les utilisateurs peuvent taper "not breathing", "نزيف", ou "brûlure" pour trouver le bon guide d'urgence.`},{label:"Détection de gravité",text:"Chaque scénario est classé Critique (rouge), Modéré (ambre) ou Mineur (vert) avec un codage visuel."},{label:"Cartographie des conditions",text:"Les mots-clés des symptômes sont mappés à 14 scénarios d'urgence validés via un scoring déterministe."},{label:"Sortie structurée",text:"Chaque réponse suit un format strict : Titre → Avertissement optionnel → Étapes numérotées. Pas de paragraphes. Pas de jargon."},{label:"Synthèse vocale",text:"L'API Web Speech lit les instructions à haute voix dans la langue sélectionnée (en-US, ar-SA, fr-FR)."},{label:"Appel d'urgence",text:"Intégration d'appel en un clic vers 911/112/999 via le protocole tel:."},{label:"Suivi de progression",text:"Progression étape par étape avec points visuels, barre de progression, navigation précédent/suivant et état d'achèvement."},{label:"Support RTL",text:"Mise en page complète de droite à gauche pour l'arabe avec icônes miroir et flux de texte directionnel."}]},{id:"coverage",icon:mu,heading:"5. Périmètre de couverture des urgences",items:[{label:"Critique (7)",text:"Arrêt Cardiaque (RCR), Saignement Sévère, Étouffement, AVC, Crise Cardiaque, Choc Électrique, Réaction Allergique Sévère, Crise/Convulsion, Empoisonnement/Surdosage, Noyade"},{label:"Modéré (4)",text:"Brûlures, Fracture, Évanouissement, Épuisement/Coup de Chaleur, Hypothermie"},{label:"Mineur (1)",text:"Saignement de Nez"},{label:"Total",text:"14 scénarios d'urgence validés avec 5-8 étapes chacun, couvrant les situations les plus courantes mettant la vie en danger rencontrées par des non-spécialistes."}]},{id:"ux",icon:yu,heading:"6. Principes UX",items:[{label:"P1",text:"Interaction minimale — boutons et tapotements préférés à la saisie. La recherche est disponible mais optionnelle."},{label:"P2",text:"Flux de décision clair : Sélection d'urgence → Écran d'avertissement → Guide étape par étape."},{label:"P3",text:"Couleurs d'urgence à haut contraste : Rouge (#DC2626) pour critique, Ambre (#D97706) pour modéré, Émeraude (#059669) pour mineur/succès."},{label:"P4",text:"Design optimisé pour la panique : grandes cibles de tapotement (>48px), texte minimal par écran, typographie grasse, pas d'encombrement."},{label:"P5",text:"Bouton d'appel d'urgence persistant sur chaque écran de scénario critique — jamais à plus d'un tapotement."},{label:"P6",text:"Cohérence linguistique — chaque pixel de l'UI et du contenu correspond à la langue sélectionnée. Zéro sortie multilingue garanti."},{label:"P7",text:"Retour immédiat — animations tactiles (échelle au tapotement), indicateurs de progression et transitions fluides."}]},{id:"safety",icon:hu,heading:"7. Considérations de sécurité",items:[{label:"S1",text:"Toutes les instructions sont alignées sur les normes internationales de premiers secours (ILCOR, AHA, ERC, Croix-Rouge)."},{label:"S2",text:"Aucune recommandation hallucinée ou spéculative — chaque étape est prédéfinie et médicalement révisée."},{label:"S3",text:"Les décisions basées sur des règles préviennent les sorties imprévisibles de l'IA. La même entrée produit toujours la même sortie."},{label:"S4",text:'Avertissements explicites "Ne PAS" pour les actions dangereuses (ex : "Ne provoquez PAS de vomissements", "Ne déplacez PAS une lésion de la colonne vertébrale").'},{label:"S5",text:"Drapeau d'appel d'urgence sur tous les scénarios critiques pour rappeler aux utilisateurs de contacter l'aide professionnelle."},{label:"S6",text:"Clause de non-responsabilité intégrée : ResQ fournit uniquement des conseils de premiers secours et ne remplace pas les soins médicaux professionnels."},{l
